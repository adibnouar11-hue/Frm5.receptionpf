// AUDIT — important actions only

  S.log.push({ts:nw(),time:nt(),action,detail:detail||""});sd();
  ss2({type:"audit",timestamp:nw(),ficheId:S.fid,operateur:S.op,action,detail:detail||""});

async function ss2(p){if(!SCRIPT_URL)return;S.sync="syncing";try{await new Promise(res=>{const ifr=document.createElement("iframe");ifr.name="f"+Date.now();ifr.style.display="none";document.body.appendChild(ifr);const fm=document.createElement("form");fm.method="POST";fm.action=SCRIPT_URL;fm.target=ifr.name;const inp=document.createElement("input");inp.type="hidden";inp.name="payload";inp.value=JSON.stringify(p);fm.appendChild(inp);document.body.appendChild(fm);fm.submit();document.body.removeChild(fm);setTimeout(()=>{try{document.body.removeChild(ifr)}catch{}res()},3000)});S.sync="ok"}catch{S.sync="error"}setTimeout(()=>{S.sync=""},2000)}

// Timer
function startTimer(){S.timerStart=Date.now();sd();if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(()=>{const tb=document.getElementById("timer-live");if(tb)updTimer(tb)},1000)}

  const app=document.getElementById("app");app.innerHTML="";
  if(S.sync){const c={syncing:["#3b82f6","⟳"],ok:["#16a34a","✓"],error:["#dc2626","✗"]}[S.sync];if(c)app.append(h("div",{className:"ss2",style:{background:c[0]}},c[1]))}

  if(S.step===1)r1(co);else if(S.step===2)r2(co);else if(S.step===3)r3(co);else if(S.step===4)r4(co);else r5(co);

  const u=S.loginUser.trim().toLowerCase(),p=S.loginPass;
  if(!u||!p){S.loginErr="Identifiant et mot de passe requis";R();return}
  if(!USERS[u]||USERS[u]!==p){S.loginErr="❌ Identifiant ou mot de passe incorrect";R();return}
